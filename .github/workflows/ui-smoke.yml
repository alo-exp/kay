name: UI Smoke

on:
  push:
    branches: [main, phase/09.1-test-coverage]
  pull_request:
    branches: [main, phase/09.1-test-coverage]
  workflow_dispatch:

# Least-privilege defaults
permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ui-smoke:
    name: UI smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Detect Rust project
        id: detect
        run: |
          if [ -f Cargo.toml ]; then
            echo "has_rust=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_rust=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582  # 1.95
        if: steps.detect.outputs.has_rust == 'true'

      - name: Build kay-tauri
        if: steps.detect.outputs.has_rust == 'true'
        run: cargo build -p kay-tauri
        shell: bash

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa  # v4
        with:
          version: 9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: crates/kay-tauri/ui/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile
        working-directory: crates/kay-tauri/ui

      - name: TypeScript type check
        run: pnpm run typecheck
        working-directory: crates/kay-tauri/ui

      - name: Run WDIO smoke tests
        run: pnpm run test:e2e
        working-directory: crates/kay-tauri/ui
        timeout-minutes: 15