auto_open_dump = false
max_conversations = 200
max_commit_count = 40
max_extensions = 30
max_fetch_chars = 100000
max_file_read_batch_size = 100
max_file_size_bytes = 209715200
max_image_size_bytes = 524288
max_line_chars = 4000
max_parallel_file_reads = 128
max_read_lines = 4000
max_requests_per_turn = 200
max_search_lines = 2000
max_search_result_bytes = 20480
max_sem_search_results = 200
max_stdout_line_chars = 1000
max_stdout_prefix_lines = 200
max_stdout_suffix_lines = 200
max_tokens = 40960
max_tool_failure_per_turn = 6
model_cache_ttl_secs = 1209600
restricted = false
sem_search_top_k = 20
services_url = "https://api.forgecode.dev/"
terminal_context = false
tool_supported = true
tool_timeout_secs = 600
top_k = 30
top_p = 0.8
verify_todos = true
research_subagent = false
currency_symbol = "$"
currency_conversion_rate = 1.0
subagents = true

[retry]
backoff_factor = 2
initial_backoff_ms = 200
max_attempts = 8
min_delay_ms = 1000
status_codes = [429, 500, 502, 503, 504, 408, 522, 524, 520, 529]
suppress_errors = false

[http]
accept_invalid_certs = false
adaptive_window = true
connect_timeout_secs = 60
hickory = false
keep_alive_interval_secs = 120
keep_alive_timeout_secs = 20
keep_alive_while_idle = true
max_redirects = 20
pool_idle_timeout_secs = 180
pool_max_idle_per_host = 10
read_timeout_secs = 1800
tls_backend = "default"

[compact]
eviction_window = 0.2
max_tokens = 4000
message_threshold = 400
on_turn_end = false
retention_window = 12
token_threshold = 200000

[updates]
auto_update = true
frequency = "daily"

[reasoning]
enabled = true
effort = "high"
