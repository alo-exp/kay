[package]
name = "kay-provider-openrouter"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "OpenRouter provider HAL (Phase 2)"

[dependencies]
forge_domain = { path = "../forge_domain" }
forge_config = { path = "../forge_config" }
forge_services = { path = "../forge_services" }
forge_repo = { path = "../forge_repo" }
forge_json_repair = { path = "../forge_json_repair" }

tokio = { workspace = true }
reqwest = { workspace = true }
reqwest-eventsource = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
# NN-7 load-bearing: IndexMap preserves insertion order so build_request_body
# can emit `required` before `properties` in tool parameter schemas without
# enabling serde_json/preserve_order (which triggers a clippy large-enum
# warning in upstream forge_app and would violate parity). See plan 02-08
# T2 Step 6 Path A variant + nn7 unit test.
indexmap = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

# Retry orchestration (PROV-02 names backon; D-09 configures it)
backon = "1.6"

# Stream + async-trait adapters
async-trait = "0.1"
async-stream = "0.3"
bytes = "1"
futures = "0.3"
tokio-stream = "0.1"

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "test-util"] }
mockito = "1.7"
proptest = "1.11"
pretty_assertions = "1"
serde_json = { workspace = true }
